<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alok Mishra — Computer Engineering Student</title>
<meta name="description" content="Portfolio of Alok Mishra, Computer Engineering student skilled in C, Python, and HTML." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Color tokens */
  --bg-void: #0a0e14;
  --bg-panel: #10141f;
  --bg-panel-raised: #151a28;
  --border-faint: rgba(150, 170, 210, 0.12);
  --border-trace: rgba(0, 240, 255, 0.35);
  --cyan: #00e8ff;
  --cyan-dim: rgba(0, 232, 255, 0.15);
  --violet: #7c5cff;
  --violet-dim: rgba(124, 92, 255, 0.15);
  --text-primary: #e8edf7;
  --text-muted: #6b7488;
  --text-faint: #424a5c;

  /* Type */
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Layout */
  --max-width: 1180px;
  --section-pad: clamp(64px, 10vw, 120px);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 15% 10%, rgba(124, 92, 255, 0.08), transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(0, 232, 255, 0.06), transparent 40%);
}

a {
  color: inherit;
  text-decoration: none;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

ul, li {
  list-style: none;
}

img {
  max-width: 100%;
  display: block;
}

::selection {
  background: var(--cyan-dim);
  color: var(--cyan);
}

::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: var(--bg-void);
}
::-webkit-scrollbar-thumb {
  background: var(--border-faint);
  border-radius: 4px;
}

.container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cyan);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.eyebrow::before {
  content: '';
  width: 18px;
  height: 1px;
  background: var(--cyan);
}

.section-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  letter-spacing: -0.01em;
  margin-bottom: 12px;
}

.section-sub {
  color: var(--text-muted);
  font-size: 1rem;
  max-width: 540px;
  margin-bottom: 48px;
  line-height: 1.6;
}

.section {
  position: relative;
  padding: var(--section-pad) 0;
  z-index: 1;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 3px;
  border-radius: 2px;
}

/* ===================== LOADER ===================== */
.loader {
  position: fixed;
  inset: 0;
  background: var(--bg-void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 999;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}

.loader--leaving {
  opacity: 0;
  visibility: hidden;
}

.loader__content {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: var(--cyan);
  display: flex;
  gap: 8px;
  letter-spacing: 0.05em;
}

.loader__bracket {
  color: var(--violet);
}

.loader__dots span {
  animation: loaderDot 1.2s infinite;
  opacity: 0;
}
.loader__dots span:nth-child(2) { animation-delay: 0.2s; }
.loader__dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes loaderDot {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}

.loader__bar {
  width: 160px;
  height: 2px;
  background: var(--border-faint);
  overflow: hidden;
  border-radius: 2px;
}

.loader__bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--cyan), var(--violet));
  animation: loaderFill 1s ease forwards;
}

@keyframes loaderFill {
  to { width: 100%; }
}

/* ===================== NAVBAR ===================== */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 22px 0;
  transition: padding 0.3s ease, background 0.3s ease, border-color 0.3s ease;
  border-bottom: 1px solid transparent;
}

.navbar--scrolled {
  padding: 14px 0;
  background: rgba(10, 14, 20, 0.75);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-faint);
}

.navbar__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.navbar__logo {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.2rem;
  letter-spacing: 0.02em;
}

.navbar__logo-bracket {
  color: var(--cyan);
}

.navbar__links {
  display: flex;
  align-items: center;
  gap: 36px;
}

.navbar__link {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-muted);
  position: relative;
  padding: 4px 0;
  transition: color 0.2s ease;
}

.navbar__link::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -2px;
  width: 0;
  height: 1.5px;
  background: var(--cyan);
  transition: width 0.25s ease;
}

.navbar__link:hover {
  color: var(--text-primary);
}

.navbar__link--active {
  color: var(--cyan);
}

.navbar__link--active::after {
  width: 100%;
}

.navbar__burger {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: 6px;
}

.navbar__burger span {
  width: 22px;
  height: 2px;
  background: var(--text-primary);
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.navbar__burger--open span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.navbar__burger--open span:nth-child(2) {
  opacity: 0;
}
.navbar__burger--open span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

.navbar__mobile {
  display: none;
  flex-direction: column;
  background: rgba(10, 14, 20, 0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-faint);
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

.navbar__mobile--open {
  max-height: 420px;
}

.navbar__mobile-link {
  padding: 16px 24px;
  text-align: left;
  font-size: 1rem;
  color: var(--text-muted);
  border-top: 1px solid var(--border-faint);
}

.navbar__mobile-link--active {
  color: var(--cyan);
}

@media (max-width: 820px) {
  .navbar__links { display: none; }
  .navbar__burger { display: flex; }
  .navbar__mobile { display: flex; }
}

/* ===================== BUTTONS ===================== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 24px;
  border-radius: 8px;
  font-size: 0.92rem;
  font-weight: 600;
  font-family: var(--font-body);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  white-space: nowrap;
}

.btn--primary {
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  color: #06080d;
  box-shadow: 0 0 0 0 rgba(0, 232, 255, 0);
}

.btn--primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px -8px rgba(0, 232, 255, 0.5);
}

.btn--ghost {
  border: 1px solid var(--border-faint);
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.02);
}

.btn--ghost:hover {
  border-color: var(--border-trace);
  color: var(--cyan);
  transform: translateY(-2px);
}

.btn--icon {
  padding: 13px;
  border: 1px solid var(--border-faint);
  border-radius: 8px;
  color: var(--text-primary);
}

.btn--icon:hover {
  border-color: var(--border-trace);
  color: var(--cyan);
  transform: translateY(-2px);
}

/* ===================== HERO ===================== */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding-top: 120px;
  position: relative;
}

.hero__grid-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--border-faint) 1px, transparent 1px),
    linear-gradient(90deg, var(--border-faint) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 0%, transparent 70%);
  opacity: 0.5;
  z-index: 0;
}

.hero__inner {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 48px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.hero__fade {
  opacity: 0;
  transform: translateY(16px);
  animation: heroFadeIn 0.7s ease forwards;
}
.hero__fade--1 { animation-delay: 0.1s; }
.hero__fade--2 { animation-delay: 0.22s; }
.hero__fade--3 { animation-delay: 0.34s; }
.hero__fade--4 { animation-delay: 0.46s; }
.hero__fade--5 { animation-delay: 0.58s; }
.hero__fade--6 { animation-delay: 0.5s; }

@keyframes heroFadeIn {
  to { opacity: 1; transform: translateY(0); }
}

.hero__status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #3fe87f;
  box-shadow: 0 0 0 3px rgba(63, 232, 127, 0.2);
}

.hero__name {
  font-family: var(--font-display);
  font-size: clamp(2.6rem, 6vw, 4.6rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.05;
  background: linear-gradient(135deg, #ffffff 40%, var(--cyan) 90%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 14px;
}

.hero__role {
  font-family: var(--font-mono);
  font-size: clamp(1rem, 2vw, 1.25rem);
  color: var(--text-muted);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
}

.hero__prompt {
  color: var(--violet);
  margin-right: 8px;
}

.hero__cursor {
  margin-left: 2px;
  color: var(--cyan);
  opacity: 1;
}

.hero__cursor--blink {
  animation: blink 1s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.hero__desc {
  color: var(--text-muted);
  font-size: 1.05rem;
  line-height: 1.7;
  max-width: 520px;
  margin-bottom: 36px;
}

.hero__actions {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.hero__scroll-cue {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-faint);
  z-index: 2;
}

.hero__scroll-line {
  width: 1px;
  height: 28px;
  background: linear-gradient(to bottom, var(--cyan), transparent);
  animation: scrollLine 1.8s ease-in-out infinite;
}

@keyframes scrollLine {
  0%, 100% { transform: scaleY(1); opacity: 0.4; }
  50% { transform: scaleY(1.3); opacity: 1; }
}

/* Profile card */
.hero__card-wrap {
  display: flex;
  justify-content: center;
  position: relative;
  z-index: 1;
}

.profile-card {
  position: relative;
  width: 100%;
  max-width: 320px;
  background: linear-gradient(160deg, rgba(21, 26, 40, 0.8), rgba(16, 20, 31, 0.6));
  border: 1px solid var(--border-faint);
  border-radius: 16px;
  backdrop-filter: blur(20px);
  padding: 36px 28px;
  text-align: center;
  animation: cardFloat 5s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.profile-card__corner {
  position: absolute;
  width: 22px;
  height: 22px;
  border: 2px solid var(--cyan);
}
.profile-card__corner--tl {
  top: -1px; left: -1px;
  border-right: none; border-bottom: none;
  border-radius: 8px 0 0 0;
}
.profile-card__corner--br {
  bottom: -1px; right: -1px;
  border-left: none; border-top: none;
  border-radius: 0 0 8px 0;
}

.profile-card__avatar {
  width: 88px;
  height: 88px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan-dim), var(--violet-dim));
  border: 1px solid var(--border-trace);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--cyan);
}

.profile-card__name {
  font-family: var(--font-display);
  font-size: 1.3rem;
  margin-bottom: 4px;
}

.profile-card__title {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.profile-card__divider {
  height: 1px;
  background: var(--border-faint);
  margin-bottom: 24px;
}

.profile-card__stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 24px;
}

.profile-card__stats > div {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.profile-card__stat-value {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--cyan);
}

.profile-card__stat-label {
  font-size: 0.68rem;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.profile-card__location {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 0.78rem;
  color: var(--text-muted);
}

@media (max-width: 900px) {
  .hero__inner {
    grid-template-columns: 1fr;
    text-align: center;
  }
  .hero__desc { margin-inline: auto; }
  .hero__actions { justify-content: center; }
  .hero__card-wrap { order: -1; margin-bottom: 12px; }
  .hero__scroll-cue { display: none; }
}

/* ===================== GLASS PANEL (shared) ===================== */
.glass-panel {
  background: linear-gradient(160deg, rgba(21, 26, 40, 0.7), rgba(16, 20, 31, 0.5));
  border: 1px solid var(--border-faint);
  border-radius: 16px;
  backdrop-filter: blur(20px);
}

/* ===================== ABOUT ===================== */
.about__layout {
  display: grid;
  grid-template-columns: 0.85fr 1.15fr;
  gap: 56px;
  align-items: start;
}

.about__bio {
  padding: 32px;
}

.about__bio p {
  color: var(--text-muted);
  line-height: 1.75;
  font-size: 0.98rem;
  margin-bottom: 16px;
}

.about__bio p:last-of-type {
  margin-bottom: 28px;
}

.about__achievements {
  display: flex;
  gap: 24px;
  border-top: 1px solid var(--border-faint);
  padding-top: 24px;
}

.about__achv {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.about__achv-value {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--cyan);
}

.about__achv-label {
  font-size: 0.72rem;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Timeline — circuit trace signature element */
.timeline {
  position: relative;
  padding-left: 36px;
}

.timeline__trace {
  position: absolute;
  left: 7px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: linear-gradient(to bottom, var(--cyan), var(--violet) 60%, transparent);
  box-shadow: 0 0 8px rgba(0, 232, 255, 0.4);
}

.timeline__item {
  position: relative;
  margin-bottom: 28px;
  opacity: 0;
  transform: translateX(-16px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.timeline__item--visible {
  opacity: 1;
  transform: translateX(0);
}

.timeline__item:last-child {
  margin-bottom: 0;
}

.timeline__node {
  position: absolute;
  left: -36px;
  top: 4px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--bg-void);
  border: 2px solid var(--cyan);
  display: flex;
  align-items: center;
  justify-content: center;
}

.timeline__node::after {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cyan);
}

.timeline__node-tag {
  position: absolute;
  left: 24px;
  top: -3px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-faint);
  text-transform: uppercase;
  white-space: nowrap;
}

.timeline__card {
  background: rgba(21, 26, 40, 0.5);
  border: 1px solid var(--border-faint);
  border-radius: 12px;
  padding: 20px 22px;
  margin-left: 8px;
  transition: border-color 0.25s ease, transform 0.25s ease;
}

.timeline__card:hover {
  border-color: var(--border-trace);
  transform: translateX(4px);
}

.timeline__card h4 {
  font-family: var(--font-display);
  font-size: 1.05rem;
  margin-bottom: 4px;
}

.timeline__org {
  color: var(--text-muted);
  font-size: 0.88rem;
  margin-bottom: 2px;
}

.timeline__meta {
  color: var(--text-faint);
  font-size: 0.82rem;
  margin-bottom: 10px;
}

.timeline__status {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--cyan);
  background: var(--cyan-dim);
  padding: 4px 10px;
  border-radius: 5px;
}

@media (max-width: 900px) {
  .about__layout {
    grid-template-columns: 1fr;
    gap: 40px;
  }
}

@media (max-width: 500px) {
  .about__achievements { flex-wrap: wrap; gap: 18px; }
}

/* ===================== SKILLS ===================== */
.skills__group {
  margin-bottom: 48px;
}

.skills__group:last-child {
  margin-bottom: 0;
}

.skills__group-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 24px;
}

.skills__group-title svg {
  color: var(--violet);
}

.skills__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.skill-card {
  background: linear-gradient(160deg, rgba(21, 26, 40, 0.7), rgba(16, 20, 31, 0.5));
  border: 1px solid var(--border-faint);
  border-radius: 14px;
  padding: 24px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}

.skill-card--visible {
  opacity: 1;
  transform: translateY(0);
}

.skill-card:hover {
  border-color: var(--border-trace);
  box-shadow: 0 12px 30px -12px rgba(0, 232, 255, 0.25);
  transform: translateY(-4px);
}

.skill-card__top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}

.skill-card__name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.15rem;
}

.skill-card__pct {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--cyan);
}

.skill-card__bar {
  height: 5px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 14px;
}

.skill-card__bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--violet), var(--cyan));
  border-radius: 4px;
  transition: width 1.1s cubic-bezier(0.16, 1, 0.3, 1);
}

.skill-card__level {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.5;
}

.skills__grid--tools {
  grid-template-columns: repeat(3, 1fr);
}

.tool-card {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: rgba(21, 26, 40, 0.4);
  border: 1px solid var(--border-faint);
  border-radius: 14px;
  padding: 22px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.25s ease, transform 0.25s ease;
}

.tool-card--visible {
  opacity: 1;
  transform: translateY(0);
}

.tool-card:hover {
  border-color: var(--border-trace);
  transform: translateY(-4px);
}

.tool-card__icon {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--violet-dim);
  color: var(--violet);
  display: flex;
  align-items: center;
  justify-content: center;
}

.tool-card h4 {
  font-family: var(--font-display);
  font-size: 1rem;
  margin-bottom: 4px;
}

.tool-card p {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.5;
}

@media (max-width: 900px) {
  .skills__grid, .skills__grid--tools {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 560px) {
  .skills__grid, .skills__grid--tools {
    grid-template-columns: 1fr;
  }
}

/* ===================== PROJECTS ===================== */
.projects__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}

.project-card {
  position: relative;
  background: linear-gradient(160deg, rgba(21, 26, 40, 0.7), rgba(16, 20, 31, 0.5));
  border: 1px solid var(--border-faint);
  border-radius: 14px;
  padding: 26px;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}

.project-card--visible {
  opacity: 1;
  transform: translateY(0);
}

.project-card:hover {
  border-color: var(--border-trace);
  box-shadow: 0 16px 40px -16px rgba(124, 92, 255, 0.3);
  transform: translateY(-6px);
}

.project-card__corner {
  position: absolute;
  top: -1px;
  right: -1px;
  width: 18px;
  height: 18px;
  border-top: 2px solid var(--violet);
  border-right: 2px solid var(--violet);
  border-radius: 0 10px 0 0;
}

.project-card__status {
  align-self: flex-start;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--violet);
  background: var(--violet-dim);
  padding: 4px 10px;
  border-radius: 5px;
  margin-bottom: 16px;
}

.project-card h3 {
  font-family: var(--font-display);
  font-size: 1.15rem;
  margin-bottom: 10px;
}

.project-card p {
  font-size: 0.88rem;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 20px;
  flex-grow: 1;
}

.project-card__tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--cyan);
  background: var(--cyan-dim);
  border: 1px solid var(--border-trace);
  padding: 4px 9px;
  border-radius: 5px;
}

.project-card__link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  color: var(--text-faint);
  cursor: not-allowed;
}

.project-card--future {
  align-items: center;
  justify-content: center;
  text-align: center;
  border-style: dashed;
  border-color: var(--border-faint);
  background: rgba(255, 255, 255, 0.015);
}

.project-card__future-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px dashed var(--border-trace);
  color: var(--cyan);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}

.project-card--future h3 {
  font-size: 1rem;
  color: var(--text-muted);
}

.project-card--future p {
  flex-grow: 0;
  margin-bottom: 0;
  font-size: 0.84rem;
}

@media (max-width: 980px) {
  .projects__grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 600px) {
  .projects__grid { grid-template-columns: 1fr; }
}

/* ===================== RESUME ===================== */
.resume__layout {
  display: grid;
  grid-template-columns: 0.95fr 1.05fr;
  gap: 56px;
  align-items: center;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.resume__layout--visible {
  opacity: 1;
  transform: translateY(0);
}

.resume-preview {
  background: var(--bg-panel);
  border: 1px solid var(--border-faint);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 30px 60px -30px rgba(0, 0, 0, 0.6);
}

.resume-preview__bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.03);
  border-bottom: 1px solid var(--border-faint);
}

.resume-preview__bar span:not(.resume-preview__filename) {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--text-faint);
}

.resume-preview__filename {
  margin-left: 8px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-faint);
}

.resume-preview__body {
  position: relative;
  padding: 28px 26px;
  height: 320px;
  overflow: hidden;
}

.resume-preview__name {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
}

.resume-preview__role {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.resume-preview__line {
  height: 8px;
  background: rgba(255, 255, 255, 0.07);
  border-radius: 4px;
  margin-bottom: 10px;
}

.resume-preview__line--w90 { width: 90%; }
.resume-preview__line--w80 { width: 80%; }
.resume-preview__line--w70 { width: 70%; }
.resume-preview__line--w60 { width: 60%; }
.resume-preview__line--w50 { width: 50%; }

.resume-preview__section-label {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--cyan);
  margin: 18px 0 10px;
}

.resume-preview__chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.resume-preview__chips span {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  border: 1px solid var(--border-faint);
  padding: 4px 9px;
  border-radius: 5px;
}

.resume-preview__fade {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 80px;
  background: linear-gradient(to bottom, transparent, var(--bg-panel));
}

.resume__info h3 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  margin-bottom: 14px;
}

.resume__info > p {
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 24px;
}

.resume__highlights {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 32px;
}

.resume__highlights li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.92rem;
  color: var(--text-primary);
}

.resume__highlights svg {
  color: var(--cyan);
  flex-shrink: 0;
}

@media (max-width: 900px) {
  .resume__layout {
    grid-template-columns: 1fr;
    gap: 36px;
  }
  .resume-preview__body { height: 280px; }
}

/* ===================== CONTACT ===================== */
.contact__layout {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 48px;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.contact__layout--visible {
  opacity: 1;
  transform: translateY(0);
}

.contact__info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.contact__row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1px solid var(--border-faint);
  transition: transform 0.2s ease;
}

a.contact__row:hover {
  transform: translateX(6px);
}

.contact__row--static:hover {
  transform: none;
}

.contact__icon {
  width: 42px;
  height: 42px;
  flex-shrink: 0;
  border-radius: 10px;
  background: var(--cyan-dim);
  color: var(--cyan);
  display: flex;
  align-items: center;
  justify-content: center;
}

.contact__label {
  display: block;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-faint);
  margin-bottom: 3px;
}

.contact__value {
  display: block;
  font-size: 0.95rem;
  color: var(--text-primary);
  word-break: break-word;
}

.contact__socials {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.social-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  border: 1px solid var(--border-faint);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
}

.social-icon:hover {
  border-color: var(--border-trace);
  color: var(--cyan);
  transform: translateY(-3px);
}

.contact-form {
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-form__field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.contact-form__field label {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 500;
}

.contact-form__field input,
.contact-form__field textarea {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-faint);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.92rem;
  resize: vertical;
  transition: border-color 0.2s ease, background 0.2s ease;
}

.contact-form__field input::placeholder,
.contact-form__field textarea::placeholder {
  color: var(--text-faint);
}

.contact-form__field input:focus,
.contact-form__field textarea:focus {
  border-color: var(--border-trace);
  background: rgba(255, 255, 255, 0.05);
  outline: none;
}

.contact-form__submit {
  justify-content: center;
  margin-top: 4px;
}

@media (max-width: 900px) {
  .contact__layout {
    grid-template-columns: 1fr;
    gap: 36px;
  }
}

/* ===================== FOOTER ===================== */
.footer {
  border-top: 1px solid var(--border-faint);
  padding: 28px 0;
}

.footer__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.footer__brand {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--cyan);
}

.footer__text {
  font-size: 0.82rem;
  color: var(--text-faint);
}
